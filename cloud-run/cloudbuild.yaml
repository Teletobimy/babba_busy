# Cloud Build 설정 - Cloud Run 배포
steps:
  # Docker 이미지 빌드
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/babba-ai-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/babba-ai-api:latest'
      - '.'
    dir: 'cloud-run'

  # Container Registry에 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/babba-ai-api:$COMMIT_SHA'
    dir: 'cloud-run'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/babba-ai-api:latest'
    dir: 'cloud-run'

  # Cloud Run 배포
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'babba-ai-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/babba-ai-api:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast3'  # 서울 리전
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '60s'
      - '--set-env-vars'
      - 'ENVIRONMENT=production,GCP_PROJECT_ID=$PROJECT_ID'
      - '--set-secrets'
      - 'GEMINI_API_KEY=gemini-api-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/babba-ai-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/babba-ai-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
