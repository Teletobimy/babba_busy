name: Flutter CI/CD

on:
  # lib/ 폴더 변경 시 자동 웹 배포
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'web/**'

  # 수동 실행
  workflow_dispatch:
    inputs:
      deploy_web:
        description: 'Deploy to Firebase Hosting'
        required: true
        default: true
        type: boolean
      build_android:
        description: 'Build Android APK'
        required: true
        default: false
        type: boolean
      build_ios:
        description: 'Build iOS'
        required: true
        default: false
        type: boolean

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          touch .env
          flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          touch .env
          flutter pub get

      - name: Run tests
        run: flutter test --coverage || true

  # PWA 빌드 및 Firebase Hosting 배포
  deploy-web:
    name: Deploy PWA
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: github.event_name == 'push' || github.event.inputs.deploy_web == 'true'
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          touch .env
          flutter pub get

      - name: Get version from pubspec.yaml
        id: version
        run: |
          # 현재 버전 읽기 (수정하지 않음)
          CURRENT_VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "Current version: $CURRENT_VERSION"

          # 버전과 빌드 번호 분리 (예: 1.1.0+1 -> 1.1.0 / 1)
          VERSION=$(echo $CURRENT_VERSION | cut -d'+' -f1)
          BUILD=$(echo $CURRENT_VERSION | cut -d'+' -f2)

          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD" >> $GITHUB_OUTPUT

      - name: Generate App Icons
        run: dart run flutter_launcher_icons

      - name: Build Web (PWA)
        run: flutter build web --release --no-tree-shake-icons --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Create version.json
        run: |
          echo "{\"version\":\"${{ steps.version.outputs.version }}\",\"buildNumber\":${{ steps.version.outputs.build_number }},\"buildTime\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > build/web/version.json
          cat build/web/version.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live


  # Android APK 빌드
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: github.event.inputs.build_android == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          touch .env
          flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # iOS 빌드 (코드사인 없음)
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [analyze, test]
    if: github.event.inputs.build_ios == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          touch .env
          flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
