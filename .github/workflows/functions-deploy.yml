name: Cloud Functions Deploy

on:
  # functions/ 폴더 변경 시 자동 배포
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'

  # 수동 실행
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: |
          cd functions
          npm ci

      - name: Lint
        run: |
          cd functions
          npm run lint

      - name: Build
        run: |
          cd functions
          npm run build

      - name: Setup Firebase CLI
        run: |
          npm install -g firebase-tools

      - name: Authenticate to Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > $HOME/gcloud-key.json
          gcloud auth activate-service-account --key-file=$HOME/gcloud-key.json
          firebase use ***REMOVED_PROJECT_ID***

      - name: Deploy Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/gcloud-key.json
        run: |
          cp $HOME/gcloud-key.json ${{ github.workspace }}/gcloud-key.json
          firebase deploy --only functions --force --json
