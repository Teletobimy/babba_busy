name: Cloud Functions Deploy

on:
  # functions/ 폴더 변경 시 자동 배포
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'firebase.json'

  # 수동 실행
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Cloud Functions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: |
          cd functions
          npm ci

      - name: Lint
        run: |
          cd functions
          npm run lint

      - name: Build
        run: |
          cd functions
          npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'

      - name: Deploy Cloud Functions
        run: |
          npm install -g firebase-tools
          gcloud config set auth/impersonate_service_account ***REMOVED_PROJECT_ID***@appspot.gserviceaccount.com
          firebase use ***REMOVED_PROJECT_ID***
          firebase deploy --only functions --force
