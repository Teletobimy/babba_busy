name: family_hub
description: "가족 공유 앱 - TodoList, 스케줄러, 추억 지도, 가계부"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.4
  cloud_firestore: ^5.6.6
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  
  # Google AI (Gemini)
  google_generative_ai: ^0.4.6
  
  # Navigation
  go_router: ^14.8.1
  
  # UI Components
  flutter_animate: ^4.5.2
  fl_chart: ^0.70.2
  table_calendar: ^3.2.0
  cached_network_image: ^3.4.1
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.3.5
  
  # Icons
  iconsax: ^0.0.8
  
  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - .env